name: Bug Report
description: Something is not working as expected
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: What happened?
      placeholder: Describe what you saw.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `rkit init`
        2. Run `rkit new --title "Test"`
        3. ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: roadkit version
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. macOS 15.4, Ubuntu 24.04
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      description: Paste any relevant error output.
      render: shell

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - Blocking — cannot use roadkit at all
        - Major — core feature broken
        - Minor — cosmetic or edge case
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help.
